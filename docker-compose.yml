services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: wasel_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16
    container_name: wasel_db
    environment:
      POSTGRES_DB: wasel_db
      POSTGRES_USER: wasel
      POSTGRES_PASSWORD: wasel
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wasel -d wasel_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
